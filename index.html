<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pra você laraaaaaaaa💕💕 ❤️ ❤️ ❤️</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg1:#1a0010; --bg2:#3d0020; --bg3:#6b0030;
  --pink:#ffb3c6; --rose:#e91e8c; --rose2:#c2185b;
  --text:rgba(255,230,235,.9);
  --card:rgba(255,255,255,.07);
  --border:rgba(255,180,200,.22);
}

body {
  min-height:100vh;
  background:linear-gradient(135deg,var(--bg1) 0%,var(--bg2) 40%,var(--bg3) 70%,var(--bg2) 100%);
  font-family:'Georgia',serif;
  color:var(--text);
  overflow-x:hidden;
}

/* Hearts */
#hearts { position:fixed; inset:0; pointer-events:none; z-index:0; }
.heart  { position:absolute; bottom:-40px; animation:floatUp linear forwards; opacity:0; }
@keyframes floatUp {
  0%   { transform:translateY(0) scale(1); opacity:.85; }
  100% { transform:translateY(-110vh) scale(.3); opacity:0; }
}

/* Screens */
.screen {
  display:none; position:relative; z-index:1;
  min-height:100vh; flex-direction:column;
  align-items:center; justify-content:center;
  padding:32px 20px; animation:fadeScreen .55s ease;
}
.screen.active { display:flex; }
@keyframes fadeScreen {
  from { opacity:0; transform:translateY(18px); }
  to   { opacity:1; transform:translateY(0); }
}

/* Card */
.card {
  width:min(94vw,420px);
  background:var(--card);
  backdrop-filter:blur(16px);
  border:1px solid var(--border);
  border-radius:28px;
  padding:36px 26px 30px;
  text-align:center;
  box-shadow:0 8px 40px rgba(0,0,0,.45);
}

/* Typography */
.label { font-size:.7rem; letter-spacing:2.5px; text-transform:uppercase; color:rgba(255,180,200,.5); margin-bottom:14px; }
.big-emoji { font-size:3.4rem; display:block; margin-bottom:14px; animation:popIn .5s ease; }
@keyframes popIn {
  0%  { transform:scale(0); opacity:0; }
  70% { transform:scale(1.18); }
  100%{ transform:scale(1); opacity:1; }
}
h1 { font-size:1.55rem; color:var(--pink); line-height:1.3; margin-bottom:14px; }
h2 { font-size:1.25rem; color:var(--pink); line-height:1.3; margin-bottom:14px; animation:fadeUp .7s ease; }
p  { font-size:1rem; line-height:1.8; margin-bottom:26px; animation:fadeUp .9s ease; min-height:60px; }
@keyframes fadeUp {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}

/* Buttons */
.btn-group { display:flex; flex-direction:column; gap:12px; width:100%; }
button {
  width:100%; padding:15px 20px; border:none; border-radius:50px;
  font-size:1rem; font-family:inherit; font-weight:bold; letter-spacing:.4px;
  cursor:pointer; transition:transform .13s, box-shadow .13s;
}
button:active { transform:scale(.95); }
.btn-main   { background:linear-gradient(135deg,var(--rose),var(--rose2)); color:#fff; box-shadow:0 4px 22px rgba(233,30,140,.4); }
.btn-main:hover { box-shadow:0 6px 30px rgba(233,30,140,.6); }
.btn-outline{ background:rgba(255,255,255,.09); color:var(--pink); border:1px solid var(--border); }
.btn-outline:hover { background:rgba(255,255,255,.16); }
.btn-ghost  { background:transparent; color:rgba(255,180,200,.55); border:1px solid rgba(255,180,200,.25); font-size:.85rem; font-weight:normal; padding:10px 20px; }

/* Progress dots */
#progress { display:flex; justify-content:center; gap:7px; margin-bottom:20px; }
.dot { width:8px; height:8px; border-radius:50%; background:rgba(255,180,200,.2); transition:background .4s; }
.dot.active { background:var(--rose); }
.dot.done   { background:rgba(233,30,140,.4); }

/* Player */
.player-wrap { margin:16px 0; }
.play-btn {
  width:72px; height:72px; border-radius:50%;
  background:linear-gradient(135deg,var(--rose),var(--rose2));
  color:#fff; font-size:1.8rem;
  display:flex; align-items:center; justify-content:center;
  margin:0 auto 14px;
  box-shadow:0 4px 24px rgba(233,30,140,.5);
  border:none; cursor:pointer; padding:0;
  transition:transform .15s;
}
.play-btn:active { transform:scale(.92); }

.player-controls { display:flex; align-items:center; justify-content:center; gap:18px; margin-bottom:14px; }
.ctrl-btn {
  background:rgba(255,255,255,.1); border:1px solid var(--border);
  color:var(--pink); font-size:1.3rem;
  width:44px; height:44px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; padding:0; transition:background .15s, transform .13s;
}
.ctrl-btn:active { transform:scale(.9); }
.ctrl-btn:hover  { background:rgba(255,255,255,.18); }

.progress-bar-wrap {
  width:100%; height:5px; background:rgba(255,180,200,.2);
  border-radius:10px; overflow:hidden; margin-bottom:8px; cursor:pointer;
}
.progress-bar-fill {
  height:100%; background:linear-gradient(90deg,var(--rose),var(--rose2));
  width:0%; transition:width .5s linear; border-radius:10px;
}
.time-row { display:flex; justify-content:space-between; font-size:.75rem; color:rgba(255,180,200,.5); margin-bottom:18px; }

/* Playlist */
.playlist {
  display:flex; flex-direction:column; gap:7px;
  max-height:250px; overflow-y:auto; margin-bottom:16px;
  scrollbar-width:thin; scrollbar-color:rgba(233,30,140,.4) transparent;
}
.playlist::-webkit-scrollbar { width:4px; }
.playlist::-webkit-scrollbar-thumb { background:rgba(233,30,140,.4); border-radius:4px; }

.track-item {
  display:flex; align-items:center; gap:12px;
  padding:11px 14px; border-radius:14px;
  background:rgba(255,255,255,.06); border:1px solid transparent;
  cursor:pointer; transition:background .2s, border-color .2s; text-align:left;
}
.track-item:hover { background:rgba(255,255,255,.12); }
.track-item.playing { background:rgba(233,30,140,.15); border-color:rgba(233,30,140,.4); }
.track-num  { font-size:.75rem; color:rgba(255,180,200,.45); min-width:18px; text-align:center; }
.track-item.playing .track-num { color:var(--rose); }
.track-name { font-size:.92rem; color:var(--pink); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.track-item.playing .track-name { color:#fff; font-weight:bold; }
.track-eq   { font-size:.85rem; opacity:0; transition:opacity .3s; }
.track-item.playing .track-eq { opacity:1; }

/* Final */
#screen-final {
  background:linear-gradient(160deg,#0d0008,#3d0020,#6b0030,#3d0020,#0d0008);
  background-size:300% 300%;
  animation:gradShift 7s ease infinite, fadeScreen .55s ease;
}
@keyframes gradShift {
  0%,100% { background-position:0% 50%; }
  50%     { background-position:100% 50%; }
}
#screen-final h1 { font-size:2rem; }
#screen-final p  { font-size:1.05rem; }
.pulse { animation:pulse 1.6s ease infinite; display:block; }
@keyframes pulse {
  0%,100% { transform:scale(1); }
  50%     { transform:scale(1.14); }
}
</style>
</head>
<body>

<div id="hearts"></div>

<!-- HOME -->
<div id="screen-home" class="screen active">
  <div class="card">
    <span class="big-emoji">💌</span>
    <h1>Oii amor... lara eu preparei isso pra você ❤️❤️❤️</h1>
    <p>Tem duas coisas aqui dentro. Uma história e músicas especiais. As duas são suas. 🤍</p>
    <div class="btn-group">
      <button class="btn-main" onclick="goTo('screen-game');startGame()">🎮 Nossa História</button>
      <button class="btn-outline" onclick="goTo('screen-music')">🎵 Ouvir algo especial</button>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="screen-game" class="screen">
  <div class="card">
    <div class="label" id="phase-label"></div>
    <div id="progress"></div>
    <span class="big-emoji" id="game-emoji"></span>
    <h2 id="game-title"></h2>
    <p id="game-text"></p>
    <div class="btn-group" id="game-btns"></div>
  </div>
</div>

<!-- FINAL -->
<div id="screen-final" class="screen">
  <div class="card">
    <span class="big-emoji pulse" id="final-emoji"></span>
    <h1 id="final-title"></h1>
    <p id="final-text" style="white-space:pre-line;"></p>
    <p id="final-sign" style="color:var(--rose);font-style:italic;font-size:1.05rem;margin-bottom:24px;"></p>
    <div class="btn-group">
      <button class="btn-outline" onclick="goTo('screen-music')">🎵 Ouvir as músicas</button>
      <button class="btn-ghost" onclick="restartGame()">↩ Recomeçar história</button>
    </div>
  </div>
</div>

<!-- MUSIC -->
<div id="screen-music" class="screen">
  <div class="card">
    <span class="big-emoji">🎶</span>
    <h2 id="music-subtitle">Essas músicas me lembram você</h2>


    <audio id="audio" preload="auto"></audio>

    <div style="font-size:.7rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,180,200,.45);margin-bottom:5px;">Tocando agora</div>
    <div id="now-playing" style="font-size:.95rem;color:var(--pink);font-weight:bold;margin-bottom:4px;min-height:20px;"></div>
    <div id="now-desc" style="font-size:.88rem;color:rgba(255,210,220,.8);font-style:italic;margin-bottom:14px;min-height:18px;"></div>


    <div class="player-wrap">
      <div class="progress-bar-wrap" onclick="seekAudio(event)">
        <div class="progress-bar-fill" id="bar-fill"></div>
      </div>
      <div class="time-row">
        <span id="time-cur">0:00</span>
        <span id="time-dur">0:00</span>
      </div>
      <div class="player-controls">
        <button class="ctrl-btn" onclick="prevTrack()">⏮</button>
        <button class="play-btn" id="play-btn" onclick="togglePlay()">▶</button>
        <button class="ctrl-btn" onclick="nextTrack()">⏭</button>
      </div>
    </div>

    <div class="playlist" id="playlist"></div>

    <div class="btn-group">
      <button class="btn-outline" onclick="goTo('screen-game');startGame()">🎮 Ver a história</button>
      <button class="btn-ghost" onclick="goTo('screen-home')">← Voltar ao início</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  ✏️ EDITE AQUI — história
// ═══════════════════════════════════════════════════
const STORY = [
  {
    phase:"Fase 1 · O Começo", emoji:"✨",
    title:"Não era pra ser especial... mas foi",

  },
  {

    title:"Nem sempre foi fácil",

    type:"choice",
    choices:[
      { label:"❤️ A gente continuou",  next:"choice_c" },
      { label:"💔 Quase desistimos",   next:"choice_d" }
    ]
  },
  {
    phase:"Fase 5 · A Escolha", emoji:"🤍",
    title:"Sempre você",
    text:"No meio de tudo, entre mil dúvidas, uma coisa sempre foi certa: eu escolho você. Não só hoje… mas todos os dias.",
    type:"final"
  }
];

const CHOICES = {
  choice_a:"Que bom saber que não era só eu... 🥺 Às vezes a gente precisa ouvir isso.",
  choice_b:"Disfarçar bem é o jeito mais fofo de admitir que tava sentindo tudo. 💕",
  choice_c:"Continuar foi a decisão mais certa que a gente tomou. 🌹",
  choice_d:"Quase desistir e não desistir... isso diz muito sobre o que a gente tem. 🌅"
};

const FINAL = {
  emoji:"💖",
  title:"Eu te amo.",
  text:"Eu não sei exatamente em que momento você deixou de ser só 'mais uma pessoa' e virou alguém tão importante pra mim.\n\nMas eu sei que, aos poucos, você foi entrando na minha rotina, nos meus pensamentos… e quando eu percebi, já não era mais só costume — era sentimento.\n\nEu gosto de você nas coisas simples. No seu jeito, nas suas manias, nas conversas bobas que acabam sendo as melhores partes do meu dia.\n\nNem tudo foi perfeito, a gente sabe disso. Teve momentos difíceis, confusões… mas mesmo assim, eu nunca quis te tirar da minha vida.\n\nPorque no meio de tudo, sempre teve algo que me fazia ficar. Algo que me fazia escolher você de novo.\n\nEu gosto de estar com você. Gosto de quem eu sou quando tô com você. E gosto da ideia de continuar construindo algo com você.\n\nNão é perfeito… mas é real. E pra mim, isso vale muito mais.",
  sign:"Eu escolho você. Hoje… e quantas vezes for preciso. ❤️ te amo dona dondoca do meu coração 💕💕 ❤️ ❤️ ❤️"
};

// ═══════════════════════════════════════════════════
//  ✏️ EDITE AQUI — playlist
//  Coloque os arquivos .mp3 na mesma pasta do index.html
// ═══════════════════════════════════════════════════
const PLAYLIST = [
  { title:"Trevo (Tu)",              file:"Trevo (Tu) 1.mp3",              desc:"você é meu trevo de 4 folhas ❤️" },
  { title:"Velha Infância",          file:"Velha Infância 2.mp3",          desc:"você foi e sempre sera um sonho pra mim ❤️❤️" },
  { title:"Pra Você Guardei o Amor", file:"Pra Você Guardei o Amor 3.mp3", desc:"você merece tudo de bom amorrr meuuu ❤️❤️❤️" },
  { title:"Meu Abrigo",              file:"Meu Abrigo 4.mp3",              desc:"so descanso em você amorrr ❤️❤️❤️❤️" },
  { title:"Amei Te Ver",             file:"Amei Te Ver 5.mp3",             desc:"a melhor parte do meu dia sempre é você amorrr ❤️❤️❤️❤️❤️" },
  { title:"Coisa Linda",             file:"Coisa Linda 6.mp3",             desc:"meu anjinhooo ❤️❤️❤️❤️❤️❤️" },
  { title:"Perfect",                 file:"Perfect 7.mp3",                 desc:"essa foi a musica que a gente escolheu pra ser nossa lembra ?? ❤️❤️❤️" },
  { title:"All of Me",               file:"All of Me 8.mp3",               desc:"eu te amooo mttt meu amorrr, espero que goste desse presentinho, não é muito mas é o que eu sei fazer né kkk ❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️" }
];
// ═══════════════════════════════════════════════════

// ── Navigation ──
let heartLoop = null;
function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  el.classList.add('active');
  el.style.animation = 'none';
  requestAnimationFrame(() => { el.style.animation = ''; });
}

// ── Hearts ──
function spawnHearts(n) {
  const c = document.getElementById('hearts');
  const list = ['❤️','💕','💖','💗','💓','🌹','✨','🫶'];
  for (let i = 0; i < n; i++) {
    setTimeout(() => {
      const h = document.createElement('span');
      h.className = 'heart';
      h.textContent = list[Math.floor(Math.random() * list.length)];
      h.style.left = Math.random() * 100 + 'vw';
      h.style.fontSize = (.7 + Math.random() * 1.3) + 'rem';
      const d = 3 + Math.random() * 3.5;
      h.style.animationDuration = d + 's';
      c.appendChild(h);
      setTimeout(() => h.remove(), d * 1000);
    }, i * 130);
  }
}

function vibe(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

// ── Game ──
let phase = 0;
function startGame() { phase = 0; renderPhase(); }

function renderPhase(overrideText) {
  const s = STORY[phase];
  document.getElementById('phase-label').textContent = s.phase;
  document.getElementById('game-emoji').textContent  = s.emoji;
  ['game-title','game-text'].forEach(id => {
    const el = document.getElementById(id);
    el.style.animation = 'none';
    requestAnimationFrame(() => { el.style.animation = ''; });
  });
  document.getElementById('game-title').textContent = s.title;
  document.getElementById('game-text').textContent  = overrideText || s.text;
  buildDots(); buildButtons(s, !!overrideText);
}

function buildDots() {
  const el = document.getElementById('progress');
  el.innerHTML = '';
  STORY.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i < phase ? ' done' : i === phase ? ' active' : '');
    el.appendChild(d);
  });
}

function buildButtons(s, isReply) {
  const g = document.getElementById('game-btns');
  g.innerHTML = '';
  if (isReply || s.type === 'continue') {
    addBtn(g, 'btn-main',  s.type === 'final' ? '💖 Ver declaração' : 'Continuar →', advance);
    addBtn(g, 'btn-ghost', '← Voltar ao início', () => goTo('screen-home'));
    return;
  }
  if (s.type === 'choice') {
    s.choices.forEach(c => addBtn(g, 'btn-outline', c.label, () => pickChoice(c.next)));
    return;
  }
  if (s.type === 'final') {
    addBtn(g, 'btn-main',  '💖 Ver declaração', showFinal);
    addBtn(g, 'btn-ghost', '← Voltar ao início', () => goTo('screen-home'));
  }
}

function addBtn(parent, cls, label, fn) {
  const b = document.createElement('button');
  b.className = cls; b.textContent = label; b.onclick = fn;
  parent.appendChild(b);
}

function pickChoice(key) { vibe(40); spawnHearts(5); renderPhase(CHOICES[key]); }

function advance() {
  if (STORY[phase].type === 'final') { showFinal(); return; }
  phase++;
  if (phase >= STORY.length) { showFinal(); return; }
  vibe(30); spawnHearts(4); renderPhase();
}

function showFinal() {
  vibe([50,80,50]); spawnHearts(22);
  document.getElementById('final-emoji').textContent = FINAL.emoji;
  document.getElementById('final-title').textContent = FINAL.title;
  document.getElementById('final-text').textContent  = FINAL.text;
  document.getElementById('final-sign').textContent  = FINAL.sign;
  goTo('screen-final');
  clearInterval(heartLoop);
  heartLoop = setInterval(() => spawnHearts(3), 1400);
}

function restartGame() { clearInterval(heartLoop); goTo('screen-game'); startGame(); }

// ── Music Player ──
const audio   = document.getElementById('audio');
const playBtn = document.getElementById('play-btn');
const barFill = document.getElementById('bar-fill');
const timeCur = document.getElementById('time-cur');
const timeDur = document.getElementById('time-dur');
let playing = false;
let currentTrack = 0;

function buildPlaylist() {
  const el = document.getElementById('playlist');
  el.innerHTML = '';
  PLAYLIST.forEach((t, i) => {
    const item = document.createElement('div');
    item.className = 'track-item' + (i === currentTrack ? ' playing' : '');
    item.id = 'track-' + i;
    item.onclick = () => loadTrack(i, true);
    item.innerHTML =
      '<span class="track-num">' + (i + 1) + '</span>' +
      '<span class="track-name">' + t.title + '</span>' +
      '<span class="track-eq">🎵</span>';
    el.appendChild(item);
  });
}

function loadTrack(index, autoplay) {
  currentTrack = index;
  const t = PLAYLIST[index];
  audio.src = t.file;
  audio.load();
  document.getElementById('now-playing').textContent = t.title;
  document.getElementById('now-desc').textContent = t.desc || '';
  document.getElementById('music-subtitle').textContent = t.desc || 'Essas músicas me lembram você';
  barFill.style.width = '0%';
  timeCur.textContent = '0:00';
  timeDur.textContent = '0:00';
  // update playlist highlight
  document.querySelectorAll('.track-item').forEach((el, i) => {
    el.classList.toggle('playing', i === index);
  });
  if (autoplay) {
    audio.play().catch(() => {});
    playBtn.textContent = '⏸';
    playing = true;
    spawnHearts(4);
    vibe(30);
  } else {
    playBtn.textContent = '▶';
    playing = false;
  }
}

function togglePlay() {
  vibe(30);
  if (!audio.src || audio.src === window.location.href) { loadTrack(0, true); return; }
  if (playing) {
    audio.pause();
    playBtn.textContent = '▶';
  } else {
    audio.play().catch(() => {});
    playBtn.textContent = '⏸';
    spawnHearts(4);
  }
  playing = !playing;
}

function nextTrack() {
  vibe(20);
  loadTrack((currentTrack + 1) % PLAYLIST.length, playing);
}

function prevTrack() {
  vibe(20);
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  loadTrack((currentTrack - 1 + PLAYLIST.length) % PLAYLIST.length, playing);
}

function fmt(s) {
  const m = Math.floor(s / 60);
  return m + ':' + String(Math.floor(s % 60)).padStart(2, '0');
}

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  barFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
  timeCur.textContent = fmt(audio.currentTime);
});
audio.addEventListener('loadedmetadata', () => { timeDur.textContent = fmt(audio.duration); });
audio.addEventListener('ended', () => { nextTrack(); });

function seekAudio(e) {
  if (!audio.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
}

// Init
